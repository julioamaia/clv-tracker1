<!-- v3.0 - ATUALIZAÇÕES 01/05/2026 -->
<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CLV Tracker v3.0</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root { 
  --bg:#0a0a0a; --bg2:#111; --bg3:#1a1a1a; --tx:#fff; --tx2:#ccc; 
  --ac:#0f7; --ac2:#0a6; --er:#f55; --av:#fa0; --win:#4f4; --loss:#f44;
  --bor:#333; --pad:.5rem; --rad:8px; --shd:0 2px 8px #0004;
  --mono:'Courier New',monospace; --f1:system-ui,sans-serif;
}
[data-theme="light"] { 
  --bg:#f8f9fa; --bg2:#fff; --bg3:#f1f3f4; --tx:#212529; --tx2:#495057;
  --bor:#ddd; --shd:0 2px 4px #0001;
}
body { background:var(--bg); color:var(--tx); font-family:var(--f1); font-size:14px; line-height:1.4; }
header { background:var(--bg2); padding:1rem; border-bottom:1px solid var(--bor); position:sticky;top:0;z-index:10; }
h1 { font-size:1.3rem; margin-bottom:.5rem; }
.nb { background:var(--bg3); color:var(--tx); border:1px solid var(--bor); padding:.4rem .8rem; margin:.2rem; border-radius:var(--rad); cursor:pointer; font-size:.9rem; }
.nb:hover { background:var(--ac2); border-color:var(--ac); }
.pg { display:none; padding:1rem; max-width:1200px; margin:0 auto; }
.pg.on { display:block; }
#q { width:100%; padding:var(--pad); border:1px solid var(--bor); border-radius:var(--rad); background:var(--bg2); color:var(--tx); margin-bottom:1rem; }
.flx { display:flex; gap:.5rem; flex-wrap:wrap; margin-bottom:1rem; }
.flx select, .flx input { padding:var(--pad); border:1px solid var(--bor); border-radius:var(--rad); background:var(--bg2); color:var(--tx); font-size:.9rem; min-width:120px; }
table { width:100%; border-collapse:collapse; background:var(--bg2); border-radius:var(--rad); overflow:hidden; box-shadow:var(--shd); }
th,td { padding:.6rem .4rem; text-align:left; border-bottom:1px solid var(--bor); }
th { background:var(--bg3); font-weight:600; font-size:.85rem; text-transform:uppercase; letter-spacing:.5px; }
td { font-size:.85rem; }
.jogo { max-width:200px; white-space:normal; word-break:break-word; font-weight:500; }
.clv-pct { font-family:var(--mono); font-weight:600; }
.clv-pct.pos { color:var(--ac); } .clv-pct.neg { color:var(--er); }
.resultado { text-align:center; font-weight:600; font-size:.9rem; padding:.4rem; border-radius:4px; }
.stake { font-family:var(--mono); font-weight:600; color:var(--av); }
.btn { padding:.3rem .6rem; border:1px solid var(--bor); background:var(--bg3); color:var(--tx); border-radius:4px; cursor:pointer; font-size:.8rem; margin:.1rem; }
.btn-sm { padding:.2rem .4rem; font-size:.75rem; }
.res-win { background:var(--win)!important; color:#000!important; border-color:var(--win)!important; }
.res-loss { background:var(--loss)!important; color:#000!important; border-color:var(--loss)!important; }
.res-halfwin { background:#ffaa00!important; color:#000!important; border-color:#ffaa00!important; }
.res-halfloss { background:#ff4400!important; color:#000!important; border-color:#ff4400!important; }
.res-cashout { background:#999!important; color:#000!important; border-color:#999!important; }
.res-anulada { background:#666!important; color:#fff!important; border-color:#666!important; }
#pnl { font-size:2rem; font-weight:700; font-family:var(--mono); text-align:center; margin:1rem 0; }
#pnl.pos { color:var(--win); } #pnl.neg { color:var(--loss); }
.card { background:var(--bg2); border:1px solid var(--bor); border-radius:var(--rad); padding:1rem; margin:1rem 0; box-shadow:var(--shd); }
.card h3 { margin-bottom:.5rem; color:var(--ac); }
#chart-container { height:300px; margin:1rem 0; }
.bnav { position:fixed; bottom:0; left:0; right:0; background:var(--bg2); border-top:1px solid var(--bor); display:flex; padding:.5rem; z-index:100; }
.bnav-btn { flex:1; background:var(--bg3); color:var(--tx); border:1px solid var(--bor); padding:.6rem; border-radius:var(--rad); cursor:pointer; font-size:.85rem; }
.bnav-btn.on { background:var(--ac); color:#000; border-color:var(--ac); }
@media (min-width:768px) { .bnav { display:none; } }
.modo { position:fixed; top:1rem; right:1rem; background:var(--bg3); color:var(--tx); border:1px solid var(--bor); padding:.4rem .6rem; border-radius:var(--rad); cursor:pointer; font-size:.8rem; z-index:1000; }
#log { position:fixed; bottom:0; right:0; width:300px; max-height:200px; background:var(--bg); border:1px solid var(--bor); border-radius:var(--rad) 0 0 0; padding:.5rem; font-family:var(--mono); font-size:.75rem; color:var(--tx2); overflow:auto; display:none; z-index:1000; }
.modal { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,.8); z-index:2000; }
.modal.on { display:flex; align-items:center; justify-content:center; }
.modal-cnt { background:var(--bg2); border-radius:var(--rad); padding:2rem; max-width:500px; width:90%; max-height:80vh; overflow:auto; }
.modal-cnt label { display:block; margin:.5rem 0 .2rem; font-weight:500; }
.modal-cnt input, .modal-cnt select, .modal-cnt textarea { width:100%; padding:var(--pad); border:1px solid var(--bor); border-radius:var(--rad); background:var(--bg3); color:var(--tx); margin-bottom:1rem; }
</style>
</head>
<body>
<div class="modo" onclick="toggleTheme()">🌙 Light/Dark</div>
<div id="log"></div>

<header>
<h1>📊 CLV Tracker v3.0</h1>
<div class="flx">
<button class="nb" onclick="baixaDados()">🔄 Baixar Dados</button>
<button class="nb" onclick="sv()">💾 Salvar Local</button>
<button class="nb" onclick="delAll()">🗑 Limpar Tudo</button>
<button class="nb" data-p="nova" onclick="goTo('nova')">➕ Nova Aposta</button>
</div>
</header>

<!-- DASHBOARD -->
<section class="pg on" id="pg-dashboard">
<input type="text" id="q" placeholder="🔍 Buscar por jogo, mercado..." oninput="renderTabela()">
<div class="flx" id="filtros">
<!-- Filtros dinâmicos gerados por fillFilters() -->
</div>
<div id="pnl">R$ 0,00</div>
<div id="chart-container"></div>
<div class="card">
<h3>📈 Resumo</h3>
<table>
<tr><th>Apostas</th><td id="tot-apostas">0</td></tr>
<tr><th>Banca Atual</th><td id="banca-atual">R$ 0,00</td></tr>
<tr><th>ROI</th><td id="roi">0%</td></tr>
<tr><th>Yield Médio</th><td id="yield-med">0%</td></tr>
</table>
</div>
<table id="tabela"></table>
</section><!-- NOVA APOSTA -->
<section class="pg" id="pg-nova">
<div class="card">
<h3>➕ Nova Aposta</h3>
<button class="btn" onclick="toggleModal('novaA')">📝 Adicionar</button>
</div>
</section>

<!-- MODAL NOVA APOSTA -->
<div class="modal" id="modal-novaA">
<div class="modal-cnt">
<h3>➕ Nova Aposta</h3>
<label>TIMESTAMP <input type="text" id="i-ts" placeholder="2026-05-01 20:00"></label>
<label>JOGO <input type="text" id="i-jogo" placeholder="Flamengo x Palmeiras"></label>
<label>MERCADO <input type="text" id="i-mkt" placeholder="Vencedor"></label>
<label>ODD ENTRADA <input type="number" id="i-oddent" step="0.01" placeholder="2.05"></label>
<label>ODD FECH <input type="number" id="i-oddfech" step="0.01" placeholder="2.00"></label>
<label>STAKE <input type="number" id="i-stake" placeholder="30"></label>
<label>TIPSTER
<select id="i-tipster">
<option value="">Selecione...</option>
<option value="AT">Anderson Tips</option>
<option value="A">Aumentadas</option>
<option value="P">Peixe</option>
<option value="EU">Eu</option>
<option value="EVV">Eu + Bot VV</option>
<option value="EUS">Eu + Surebet</option>
<option value="EUA">Eu Aleatório</option>
</select>
</label>
<label>RESULTADO
<select id="i-res">
<option value="Pendente">Pendente</option>
<option value="Win">Win</option>
<option value="Loss">Loss</option>
<option value="HalfWin">HalfWin</option>
<option value="HalfLoss">HalfLoss</option>
<option value="Cashout">Cashout</option>
<option value="Anulada">Anulada</option>
</select>
</label>
<label>NOTAS <textarea id="i-notas" placeholder="Observações..."></label>
<div style="text-align:center; margin-top:1rem;">
<button class="btn" onclick="addAposta()">✅ Salvar</button>
<button class="btn" onclick="toggleModal('novaA')">❌ Cancelar</button>
</div>
</div>
</div>

<!-- BOTTOM NAV MOBILE -->
<div class="bnav" id="bnav">
<button class="bnav-btn on" data-p="dashboard" onclick="goTo('dashboard');bnavUpdate('dashboard')">
<span class="bico">📊</span>Dashboard
</button>
<button class="bnav-btn" data-p="nova" onclick="goTo('nova');bnavUpdate('nova')">
<span class="bico">➕</span>Nova
</button>
</div><script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
// ── DADOS ────────────────────────────────────────────────────
var D = [];
var EID = 0;
var GIST_ID = '6b1f6bca8487f432f59f86aff76b72b3';
var GIST_TOKEN = 'ghp_Seutokenaqui'; // Substitua pelo seu token real
var CHART = null;
var FILTROS = { res:'', tipster:'', q:'' };

// ── BADGE MAP (v3.0) ─────────────────────────────────────────
const BADGEMAP = {
  'Win': '🟢 Win', 'Loss': '🔴 Loss', 'HalfWin': '🟡 HalfWin', 
  'HalfLoss': '🟠 HalfLoss', 'Cashout': '⚪ Cashout', 'Anulada': '⚫ Anulada',
  'Pendente': '⭕ Pendente'
};

// ── INICIALIZAÇÃO ────────────────────────────────────────────
async function init() {
  await load();
  fillFilters();
  renderDash();
  renderTabela();
  setInterval(autoSync, 3000); // Auto-sync 3s
  log('🚀 CLV Tracker v3.0 iniciado');
}
window.onload = init;

// ── SYNC GIST ────────────────────────────────────────────────
async function gistFetch() {
  try {
    const r = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
      headers: { 'Authorization': `token ${GIST_TOKEN}` }
    });
    if (!r.ok) throw new Error('Gist não encontrado');
    const raw = await r.json();
    return raw.files['clv-data.json']?.content || '[]';
  } catch(e) { log('Gist fetch: ' + e.message); return '[]'; }
}

async function gistSave(data) {
  try {
    await fetch(`https://api.github.com/gists/${GIST_ID}`, {
      method: 'PATCH',
      headers: { 
        'Authorization': `token ${GIST_TOKEN}`, 
        'Content-Type': 'application/json' 
      },
      body: JSON.stringify({ 
        files: { 
          'clv-data.json': { content: JSON.stringify(data, null, 2) } 
        } 
      })
    });
    log('✅ Gist salvo: ' + data.length + ' apostas');
  } catch(e) { log('Gist save falhou: ' + e.message); }
}

async function autoSync() {
  try {
    const raw = await gistFetch();
    const gistD = JSON.parse(raw);
    if (gistD.length > D.length) {
      D = gistD;
      sv();
      fillFilters();
      renderTabela();
      renderDash();
      log('🔄 Auto-sync: ' + D.length + ' apostas');
    }
  } catch(e) { log('Auto-sync: ' + e.message); }
}

// ── LOCAL STORAGE ────────────────────────────────────────────
function sv() { localStorage.D = JSON.stringify(D); }
function load() { 
  try {
    D = JSON.parse(localStorage.D || '[]');
    EID = Math.max(...D.map(a=>a.id||0), 0) + 1;
  } catch(e) { D=[]; EID=1; }
}function renderTabela() {
  var q = document.getElementById('q').value.toLowerCase();
  var df = D.filter(a => 
    !q || a.jogo?.toLowerCase().includes(q) || 
    a.mercado?.toLowerCase().includes(q)
  );
  df = df.filter(filtraAtivo);
  
  var tb = '';
  df.forEach(a => {
    var clv = ((a.oddfech||a.oddent||2) / (a.oddent||2) - 1) * 100;
    var badge = BADGEMAP[a.resultado] || '❓';
    var clvp = clv>=0 ? 'pos' : 'neg';
    tb += `<tr>
      <td class="jogo">${a.jogo||''}</td>
      <td>${a.mercado||''}</td>
      <td class="clv-pct ${clvp}">${clv.toFixed(1)}%</td>
      <td class="stake">R$ ${a.stake||0}</td>
      <td class="resultado ${a.resultado?.toLowerCase().replace(' ','')}">${badge}</td>
      <td>${a.tipster||''}</td>
      <td class="btn-sm" onclick="edtA(${a.id})">✏</td>
      <td class="btn-sm" onclick="delA(${a.id})">🗑</td>
    </tr>`;
  });
  document.getElementById('tabela').innerHTML = tb || '<tr><td colspan=8 style="text-align:center;color:var(--tx2)">Nenhuma aposta encontrada</td></tr>';
}

function filtraAtivo(a) {
  if (FILTROS.res && a.resultado !== FILTROS.res) return false;
  if (FILTROS.tipster && a.tipster !== FILTROS.tipster) return false;
  return true;
}

function fillFilters() {
  var tips = [...new Set(D.map(a=>a.tipster).filter(Boolean))].sort();
  var res = ['Pendente','Win','Loss','HalfWin','HalfLoss','Cashout','Anulada'];
  
  var html = `
    <select id="f-res" onchange="FILTROS.res=this.value;renderTabela()">
      <option value="">Todos Resultados</option>
      ${res.map(r=>`<option value="${r}" ${FILTROS.res===r?'selected':''}>${BADGEMAP[r]||r}</option>`).join('')}
    </select>
    <select id="f-tipster" onchange="FILTROS.tipster=this.value;renderTabela()">
      <option value="">Todos Tipsters</option>
      ${tips.map(t=>`<option value="${t}" ${FILTROS.tipster===t?'selected':''}>${t}</option>`).join('')}
    </select>
    <button class="btn" onclick="FILTROS={res:'',tipster:'',q:''};document.getElementById('q').value='';renderTabela();fillFilters()">🔄 Limpar</button>
  `;
  document.getElementById('filtros').innerHTML = html;
}

function renderDash() {
  var df = D.filter(filtraAtivo);
  var pnl = df.reduce((s,a)=>{
    if (a.resultado==='Win') return s + (a.stake * ((a.oddfech||a.oddent||2)-1));
    if (a.resultado==='Loss') return s - a.stake;
    if (a.resultado==='HalfWin') return s + (a.stake * 0.5 * ((a.oddfech||a.oddent||2)-1));
    if (a.resultado==='HalfLoss') return s - (a.stake * 0.5);
    return s;
  }, 0);
  
  document.getElementById('pnl').innerHTML = `R$ ${pnl.toFixed(2)}`;
  document.getElementById('pnl').className = pnl>=0 ? 'pos' : 'neg';
  document.getElementById('tot-apostas').textContent = df.length;
  document.getElementById('banca-atual').textContent = `R$ ${pnl.toFixed(2)}`;
  
  // Gráfico
  var ctx = document.getElementById('chart-container').children[0];
  if (ctx) ctx.remove();
  var canvas = document.createElement('canvas');
  canvas.id = 'pnl-chart';
  document.getElementById('chart-container').appendChild(canvas);
  
  if (CHART) CHART.destroy();
  CHART = new Chart(canvas, {
    type: 'doughnut',
    data: {
      labels: ['Win', 'Loss', 'HalfWin', 'HalfLoss', 'Pendente'],
      datasets: [{ data: [0,0,0,0,df.length], backgroundColor: ['#4f4','#f44','#fa0','#f80','var(--tx2)'] }]
    },
    options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{ position:'bottom' } } }
  });
}// ── CRUD ──────────────────────────────────────────────────────
function addAposta() {
  var nova = {
    id: EID++,
    ts: document.getElementById('i-ts').value,
    jogo: document.getElementById('i-jogo').value,
    mercado: document.getElementById('i-mkt').value,
    oddent: +document.getElementById('i-oddent').value || 2,
    oddfech: +document.getElementById('i-oddfech').value || 0,
    stake: +document.getElementById('i-stake').value || 0,
    tipster: document.getElementById('i-tipster').value,
    resultado: document.getElementById('i-res').value,
    notas: document.getElementById('i-notas').value
  };
  D.unshift(nova);
  sv();
  gistSave(D);
  toggleModal('novaA');
  renderTabela();
  renderDash();
  fillFilters();
  log('➕ Nova aposta #' + nova.id);
}

async function delA(id) {
  if (!confirm('Excluir esta aposta?')) return;
  D = D.filter(a=>String(a.id)!==String(id));
  sv();
  await gistSave(D);
  fillFilters();
  renderTabela();
  renderDash();
  log('🗑 Aposta #' + id + ' excluída');
}

async function delAll() {
  if (!confirm('Excluir TODAS as apostas?')) return;
  D = [];
  sv();
  await gistSave(D);
  fillFilters();
  renderTabela();
  renderDash();
  log('🗑 Todas as apostas limpas');
}

async function edtA(id) {
  var a = D.find(a=>a.id==id);
  if (!a) return alert('Aposta não encontrada');
  // Modal edição similar ao nova - implemente se necessário
  alert('Edição em desenvolvimento v3.1');
}

async function baixaDados() {
  const raw = await gistFetch();
  D = JSON.parse(raw);
  sv();
  fillFilters();
  renderTabela();
  renderDash();
  log('📥 Dados baixados: ' + D.length + ' apostas');
}

// ── NAVEGAÇÃO ─────────────────────────────────────────────────
function goTo(p) {
  document.querySelectorAll('.pg').forEach(pg=>pg.classList.remove('on'));
  document.getElementById('pg-'+p).classList.add('on');
}

function bnavUpdate(p) {
  document.querySelectorAll('.bnav-btn').forEach(b=>b.classList.remove('on'));
  document.querySelector(`[data-p="${p}"]`).classList.add('on');
}

// ── MODAL ─────────────────────────────────────────────────────
function toggleModal(id) {
  document.getElementById('modal-'+id).classList.toggle('on');
}

// ── UTIL ──────────────────────────────────────────────────────
function toggleTheme() {
  document.documentElement.dataset.theme = 
    document.documentElement.dataset.theme==='light' ? 'dark' : 'light';
}

function log(msg) {
  var l = document.getElementById('log');
  l.style.display = 'block';
  l.innerHTML += `[${new Date().toLocaleTimeString()}] ${msg}<br>`;
  l.scrollTop = l.scrollHeight;
  setTimeout(()=>l.style.display='none', 5000);
}
</script>
</body>
</html>
