<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CLV Tracker Pro</title>

<style>
:root{
  --bg:#0f1117;--sur:#181c27;--bor:#2a2f45;
  --pri:#4f98a3;--ok:#6daa45;--er:#d163a7;--wa:#e8af34;
  --tx:#e8eaf0;--mu:#7a82a0;
}
body{margin:0;font-family:Arial;background:var(--bg);color:var(--tx)}
.app{display:flex;height:100vh}
aside{width:200px;background:var(--sur);padding:10px}
.main{flex:1;padding:20px;overflow:auto}
button{cursor:pointer}

/* tabela */
table{width:100%;border-collapse:collapse}
th,td{padding:8px;border-bottom:1px solid var(--bor)}
tr:hover{background:#1e2235}

/* badges */
.badge{padding:3px 6px;border-radius:5px;font-size:12px}
.win{background:#1f3f2a;color:#7dffb0}
.loss{background:#3f1f2a;color:#ff7d9b}
.hwin{background:#2f3f1f;color:#d2ff7d}
.hloss{background:#3f2f1f;color:#ffd27d}
</style>
</head>

<body>

<div class="app">

<aside>
  <h3>CLV</h3>
  <button onclick="goTo('dashboard')">Dashboard</button><br><br>
  <button onclick="goTo('apostas')">Apostas</button><br><br>
  <button onclick="goTo('banca')">Banca</button>
</aside>

<div class="main">

<div id="dashboard">
  <h2>Dashboard</h2>
  <button onclick="autoResultados()">🔄 Atualizar</button>
</div>

<div id="apostas" style="display:none">

  <h2>Apostas</h2>

  <button onclick="openModal()">+ Nova</button>

  <br><br>

  🔎 <input id="busca" oninput="render()" placeholder="Buscar...">

  <select id="fTipster" onchange="render()">
    <option value="">Todos tipsters</option>
  </select>

  <br><br>

  <table>
    <thead>
      <tr>
        <th>Data</th>
        <th>Jogo</th>
        <th>Tipster</th>
        <th>Odd</th>
        <th>Stake</th>
        <th>Resultado</th>
        <th>Lucro</th>
      </tr>
    </thead>
    <tbody id="tb"></tbody>
  </table>

</div>

<div id="banca" style="display:none">
  <h2>Banca</h2>
  <input id="bancaInicial" placeholder="Banca inicial" oninput="renderBanca()">
  <div id="bancaAtual"></div>
</div>

</div>
</div>

<!-- MODAL -->
<div id="modal" style="display:none;position:fixed;top:20%;left:50%;transform:translateX(-50%);background:#181c27;padding:20px">

<h3>Nova Aposta</h3>

<input id="m_data" type="date"><br><br>
<input id="m_jogo" placeholder="Jogo"><br><br>
<input id="m_tipster" placeholder="Tipster"><br><br>
<input id="m_odd" type="number" placeholder="Odd"><br><br>
<input id="m_stake" type="number" placeholder="Stake"><br><br>

<select id="m_res">
  <option>Pendente</option>
  <option>Win</option>
  <option>Loss</option>
  <option>Meia Win</option>
  <option>Meia Loss</option>
</select>

<br><br>

<button onclick="save()">Salvar</button>
<button onclick="closeModal()">Cancelar</button>

</div>

<script>

let apostas = JSON.parse(localStorage.getItem('apostas')||'[]');

function goTo(p){
  document.getElementById('dashboard').style.display='none';
  document.getElementById('apostas').style.display='none';
  document.getElementById('banca').style.display='none';
  document.getElementById(p).style.display='block';
}

function openModal(){document.getElementById('modal').style.display='block'}
function closeModal(){document.getElementById('modal').style.display='none'}

function save(){

  const a = {
    data: m_data.value,
    jogo: m_jogo.value,
    tipster: m_tipster.value.toLowerCase().trim(),
    odd: parseFloat(m_odd.value),
    stake: parseFloat(m_stake.value),
    resultado: m_res.value
  };

  apostas.push(a);
  persist();
  closeModal();
  render();
}

function persist(){
  localStorage.setItem('apostas',JSON.stringify(apostas));
}

function calc(a){
  switch(a.resultado){
    case 'Win': return a.stake*(a.odd-1);
    case 'Loss': return -a.stake;
    case 'Meia Win': return (a.stake/2)*(a.odd-1);
    case 'Meia Loss': return -(a.stake/2);
    default: return 0;
  }
}

function render(){

  const busca = document.getElementById('busca').value.toLowerCase();
  const ft = document.getElementById('fTipster').value;

  let filtradas = apostas.filter(a=>{
    if(busca && !a.jogo.toLowerCase().includes(busca)) return false;
    if(ft && a.tipster!==ft) return false;
    return true;
  });

  const tb = document.getElementById('tb');
  tb.innerHTML='';

  filtradas.forEach(a=>{

    let cls='';

    if(a.resultado==='Win') cls='win';
    if(a.resultado==='Loss') cls='loss';
    if(a.resultado==='Meia Win') cls='hwin';
    if(a.resultado==='Meia Loss') cls='hloss';

    tb.innerHTML+=`
    <tr>
      <td>${a.data}</td>
      <td>${a.jogo}</td>
      <td>${a.tipster}</td>
      <td>${a.odd}</td>
      <td>${a.stake}</td>
      <td><span class="badge ${cls}">${a.resultado}</span></td>
      <td>${calc(a).toFixed(2)}</td>
    </tr>
    `;
  });

  fillTipsters();
  renderBanca();
}

function fillTipsters(){
  const ft = document.getElementById('fTipster');

  const list = [...new Set(apostas.map(a=>a.tipster))];

  ft.innerHTML='<option value="">Todos tipsters</option>';

  list.forEach(t=>{
    if(!t) return;
    ft.innerHTML+=`<option>${t}</option>`;
  });
}

function renderBanca(){
  const base = parseFloat(document.getElementById('bancaInicial').value||0);
  let total = base;

  apostas.forEach(a=>{
    total += calc(a);
  });

  document.getElementById('bancaAtual').innerText = "Banca atual: R$ "+total.toFixed(2);
}

/* AUTO SYNC */
function autoSync(){
  console.log("sync...");
}
setInterval(autoSync,300000);

render();

</script>

</body>
</html>
